# Corpus spec-check — the authoritative gate.
#
# Copy to .github/workflows/corpus-check.yml in your workspace repo. It runs `corpus check` over the
# workspace on every pull request and on pushes to main: exit 2 fails the job (blocking), exit 1
# annotates a warning, exit 0 passes. Unlike the local pre-commit hook this does NOT fail open —
# CI is where the contract is enforced.
#
# corpus-cli is not yet on npm, so this installs it from source. Once it is published, replace the
# install step with: `npm i -g @corpus/cli` (or your published name).
name: corpus check

# No `paths:` filter on purpose: if you make this a required status check, a path filter would
# leave it stuck "pending" (never reporting) on PRs that touch nothing under specs/ — blocking the
# merge. Running every time is cheap and always reports.
on:
  pull_request:
  push:
    branches: [main]

jobs:
  corpus-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install corpus-cli (from source — not yet on npm)
        run: |
          git clone --depth 1 https://github.com/jcosta33/corpus-cli "$RUNNER_TEMP/corpus-cli"
          cd "$RUNNER_TEMP/corpus-cli"
          npm install --no-audit --no-fund
          npm run build

      - name: corpus check
        shell: bash
        run: |
          set +e
          node "$RUNNER_TEMP/corpus-cli/dist/index.js" check
          rc=$?
          set -e
          if [ "$rc" -ge 2 ]; then
            echo "::error::corpus check found blocking issues — see the log above."
            exit 1
          fi
          if [ "$rc" -eq 1 ]; then
            echo "::warning::corpus check found non-blocking warnings — see the log above."
          fi
          exit 0
